version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: liquibase_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - db_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  liquibase:
    image: liquibase/liquibase:4.25
    container_name: liquibase_runner
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-appdb}?useSSL=false&allowPublicKeyRetrieval=true
      LIQUIBASE_COMMAND_USERNAME: ${MYSQL_USER:-appuser}
      LIQUIBASE_COMMAND_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
    volumes:
      - ../liquibase/changelog:/liquibase/changelog
      - ../liquibase/liquibase.properties:/liquibase/liquibase.properties
    networks:
      - db_network
    command: update

volumes:
  mysql_data:

networks:
  db_network:
    driver: bridge
